# Render Blueprint Specification
# See https://render.com/docs/blueprints for details

services:
  # 1. Backend Web Service (Node.js/Express)
  - type: web
    name: finledger-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: PORT
        value: 8000
      - key: MONGODB_URI
        sync: false # User will input this in the Render dashboard
      - key: ACCESS_TOKEN_SECRET
        sync: false
      - key: ACCESS_TOKEN_EXPIRY
        value: 1d
      - key: REFRESH_TOKEN_SECRET
        sync: false
      - key: REFRESH_TOKEN_EXPIRY
        value: 10d
      - key: CORS_ORIGIN
        sync: false # Set this to the frontend URL after deployment

# 2. Frontend Static Site (React/Vite)
staticSites:
  - name: finledger-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishPath: dist
    headers:
      - path: /*
        name: Access-Control-Allow-Origin
        value: "*"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
