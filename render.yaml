# Render Blueprint Specification
# See https://render.com/docs/blueprints for details

services:
  # 1. Backend Web Service (Node.js/Express)
  - type: web
    name: finledger-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: PORT
        value: 8000
      - key: MONGODB_URI
        sync: false # User will input this in the Render dashboard
      - key: ACCESS_TOKEN_SECRET
        sync: false
      - key: ACCESS_TOKEN_EXPIRY
        value: 1d
      - key: REFRESH_TOKEN_SECRET
        sync: false
      - key: REFRESH_TOKEN_EXPIRY
        value: 10d
      - key: CORS_ORIGIN
        sync: false # Set this to your Vercel frontend URL after deployment
